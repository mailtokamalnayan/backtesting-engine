# Streamlit project config (auto-loaded when running from the repo root).
[server]
# Auto-rerun the app whenever dashboard.py (or an imported local module) changes
# on disk -- no manual restart needed for code edits.
runOnSave = true

[browser]
gatherUsageStats = false

# Refined "quant terminal" theme to match the exported static site.
[theme]
base = "light"
primaryColor = "#126b62"
backgroundColor = "#fbfbf8"
secondaryBackgroundColor = "#f4f2ec"
textColor = "#1c2024"
font = "sans serif"
